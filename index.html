const FAIL_DATA = [

  { stage: "After P2 deleg order in GN", facility: "US_ANS", count: 157, hrs: 16.0 },

  { stage: "After P3 batch release", facility: "US_LMS", count: 8, hrs: 83.4 },

  { stage: "After P4 partner plate", facility: "US_LMS", count: 6, hrs: 35.1 },

function Metric({ label, value, sub, warn }) {
  return (
    <div className="bg-gray-50 rounded-lg px-4 py-3">
      <div className="text-xs text-gray-500">{label}</div>
      <div className={`text-2xl font-medium ${warn ? "text-red-600" : "text-gray-900"}`}>{value}</div>
      {sub && <div className="text-xs text-gray-400 mt-0.5">{sub}</div>}
    </div>
  );
}

function heatColor(val, max) {
  if (val == null || isNaN(val)) return "";
  const ratio = Math.min(Math.abs(val) / max, 1);
  return ratio > 0.7 ? "text-red-600 font-medium" : ratio > 0.3 ? "text-amber-600" : "text-green-600";
}

function FlowStep({ id, name, dur, bottleneck, side }) {
  const bg = bottleneck ? "bg-red-50 border-red-300 text-red-800" : side === "create" ? "bg-blue-50 border-blue-200 text-blue-800" : "bg-green-50 border-green-200 text-green-800";
  return (
    <div className={`rounded-md border px-2.5 py-1.5 text-xs ${bg}`}>
      <div className="font-medium">{id} <span className="font-normal opacity-70">{name}</span></div>
      <div className="text-[10px] opacity-70 mt-0.5">{dur}</div>
    </div>
  );
}

function App() {
  const [tab, setTab] = useState("overview");
  const [range, setRange] = useState(7);
  const updated = new Date().toLocaleDateString("en-GB", { day: "numeric", month: "short", year: "numeric", hour: "2-digit", minute: "2-digit" });

  const rangeData = TREND_DATA.slice(-range);
  const totalPairs = rangeData.reduce((s, d) => s + d.pairs, 0);
  const totalShipped = rangeData.reduce((s, d) => s + d.shipped, 0);
  const totalFailed = rangeData.reduce((s, d) => s + d.failed, 0);
  const totalSla = rangeData.reduce((s, d) => s + d.sla, 0);
  const facilities = FACILITY_DATA.length;

  const tabs = [
    { id: "overview", label: "Overview" },
    { id: "trends", label: "Trends" },
    { id: "facilities", label: "Facilities" },
    { id: "failures", label: "Failures" },
  ];

  return (
    <div className="max-w-[760px] mx-auto">
      <div className="flex items-baseline justify-between mb-4">
        <div>
          <h1 className="text-lg font-semibold text-gray-900">Delegation flow bottleneck analysis</h1>
          <p className="text-xs text-gray-400 mt-0.5">fct_connect_delegation_transition | {updated}</p>
        </div>
        <div className="flex items-center gap-2">
          <div className="flex bg-gray-100 rounded-md p-0.5">
            {[2, 7, 14].map(d => (
              <button key={d} onClick={() => setRange(d)} className={`text-xs px-2.5 py-1 rounded-md transition-colors ${range === d ? "bg-white text-gray-900 shadow-sm font-medium" : "text-gray-500 hover:text-gray-700"}`}>

              </button>
            ))}
          </div>
        </div>
      </div>

      <div className="grid grid-cols-4 gap-3 mb-5">
        <Metric label={`Delegation pairs (${range}d)`} value={totalPairs.toLocaleString()} sub={`${facilities} facilities`} />
        <Metric label="Shipped" value={totalShipped.toLocaleString()} sub={`${Math.round(totalShipped / totalPairs * 100)}% rate`} />
        <Metric label="Failed" value={totalFailed.toLocaleString()} sub={`${(totalFailed / totalPairs * 100).toFixed(1)}% rate`} warn={totalFailed / totalPairs > 0.1} />
        <Metric label="SLA breached" value={totalSla.toLocaleString()} sub={totalSla > 0 ? "action needed" : "within SLA"} warn={totalSla > 0} />
      </div>

      <div className="flex gap-1 mb-4 border-b border-gray-200">
        {tabs.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} className={`px-3 py-2 text-xs font-medium border-b-2 transition-colors ${tab === t.id ? "border-blue-600 text-blue-600" : "border-transparent text-gray-500 hover:text-gray-700"}`}>
            {t.label}
          </button>
        ))}
      </div>

      {tab === "overview" && (
        <div>
          <div className="mb-4">
            <div className="text-sm font-medium text-gray-700 mb-2">Order journey: median stage durations (DBI-5233)</div>
            <div className="text-xs text-gray-400 mb-3">Create side (C1-C5) then Connect side (P1-P10)</div>
            <div className="flex items-center gap-1 flex-wrap mb-2">
              <FlowStep id="C1" name="Order created" dur="2 min" side="create" />
              <span className="text-gray-300 text-xs">&rarr;</span>
              <FlowStep id="C2" name="Order in GN" dur="4.3 hrs" bottleneck />
              <span className="text-gray-300 text-xs">&rarr;</span>
              <FlowStep id="C3" name="Plate build" dur="2 min" side="create" />
              <span className="text-gray-300 text-xs">&rarr;</span>
              <FlowStep id="C4" name="Plate uploaded" dur="16 min" side="create" />
              <span className="text-gray-300 text-xs">&rarr;</span>
              <FlowStep id="C5" name="Delegation fires" dur="&lt;1 min" side="create" />
            </div>
            <div className="flex items-center gap-1 flex-wrap">
              <FlowStep id="P1" name="Deleg order" dur="&lt;1 min" side="connect" />
              <span className="text-gray-300 text-xs">&rarr;</span>
              <FlowStep id="P2" name="Deleg in GN" dur="&lt;1 min" side="connect" />
              <span className="text-gray-300 text-xs">&rarr;</span>
              <FlowStep id="P3" name="Batch release" dur="23.7 hrs" bottleneck />
              <span className="text-gray-300 text-xs">&rarr;</span>
              <FlowStep id="P4" name="Partner plate" dur="6 min" side="connect" />
              <span className="text-gray-300 text-xs">&rarr;</span>
              <FlowStep id="P5" name="Printed" dur="&lt;1 min" side="connect" />
              <span className="text-gray-300 text-xs">&rarr;</span>
              <FlowStep id="P7" name="Scanned" dur="&lt;1 min" side="connect" />
              <span className="text-gray-300 text-xs">&rarr;</span>

                <YAxis yAxisId="left" tick={{ fontSize: 11 }} />
                <YAxis yAxisId="right" orientation="right" tick={{ fontSize: 11 }} domain={[0, 40]} unit="%" />

                <Bar yAxisId="left" dataKey="failed" fill="#ef4444" name="Failed" />

              </ComposedChart>
            </ResponsiveContainer>
          </div>
        </div>
      )}

      {tab === "facilities" && (
        <div>
          <div className="text-sm font-medium text-gray-700 mb-1">Facility heatmap: median hours per stage</div>
          <div className="text-xs text-gray-400 mb-3">Red = slowest stage per facility. Sorted by volume.</div>
          <div className="overflow-x-auto">
            <table className="w-full text-xs">
              <thead>
                <tr className="border-b border-gray-200">
                  <th className="text-left py-2 px-2 text-gray-500 font-medium">Facility</th>
                  <th className="text-right py-2 px-2 text-gray-500 font-medium">Orders</th>
                  <th className="text-right py-2 px-2 text-gray-500 font-medium">Create&rarr;Deleg<div className="text-[9px] font-normal text-gray-400">C1&rarr;P1</div></th>
                  <th className="text-right py-2 px-2 text-gray-500 font-medium">Deleg&rarr;Batch<div className="text-[9px] font-normal text-gray-400">P1&rarr;P3</div></th>
                  <th className="text-right py-2 px-2 text-gray-500 font-medium">Batch&rarr;Print<div className="text-[9px] font-normal text-gray-400">P3&rarr;P5</div></th>
                  <th className="text-right py-2 px-2 text-gray-500 font-medium">Print&rarr;Ship<div className="text-[9px] font-normal text-gray-400">P5&rarr;P8</div></th>
                  <th className="text-right py-2 px-2 text-gray-500 font-medium">E2E</th>

                </tr>

              <tbody>
                {FACILITY_DATA.map((r, i) => {
                  const maxStage = Math.max(r.c2d, r.db, Math.abs(r.bp), r.ps);
                  const failPct = (r.fail / r.ord * 100).toFixed(1);
                  return (
                    <tr key={i} className={`border-b border-gray-100 ${i % 2 === 0 ? "" : "bg-gray-50/50"}`}>
                      <td className="py-1.5 px-2 font-medium text-gray-800">{r.f} {r.v !== "ws" && <span className="text-gray-400 font-normal">({r.v})</span>}</td>
                      <td className="text-right py-1.5 px-2 text-gray-600">{r.ord.toLocaleString()}</td>
                      <td className={`text-right py-1.5 px-2 ${r.c2d === maxStage && maxStage > 5 ? "text-red-600 font-medium" : heatColor(r.c2d, 20)}`}>{r.c2d}h</td>
                      <td className={`text-right py-1.5 px-2 ${r.db === maxStage && maxStage > 5 ? "text-red-600 font-medium" : heatColor(r.db, 35)}`}>{r.db}h</td>
                      <td className={`text-right py-1.5 px-2 ${Math.abs(r.bp) === maxStage && maxStage > 5 ? "text-red-600 font-medium" : heatColor(r.bp, 50)}`}>{r.bp}h</td>
                      <td className={`text-right py-1.5 px-2 ${heatColor(r.ps, 2)}`}>{r.ps}h</td>
                      <td className={`text-right py-1.5 px-2 ${heatColor(r.e2e, 100)}`}>{r.e2e}h</td>
                      <td className={`text-right py-1.5 px-2 ${parseFloat(failPct) > 15 ? "text-red-600 font-medium" : parseFloat(failPct) > 5 ? "text-amber-600" : "text-green-600"}`}>{failPct}%</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
          <div className="text-[10px] text-gray-400 mt-2">* Negative batch&rarr;print values indicate timestamp ordering issues</div>

          <div className="text-sm font-medium text-gray-700 mb-2 mt-6">Failure rate by facility (last {range} days)</div>
          <div style={{ height: Math.max(200, FACILITY_DATA.length * 24) }}>
            <ResponsiveContainer width="100%" height="100%">
              <BarChart data={FACILITY_DATA.map(r => ({ ...r, failPct: Math.round(r.fail / r.ord * 100 * 10) / 10 })).sort((a, b) => b.failPct - a.failPct)} layout="vertical" margin={{ top: 5, right: 40, bottom: 5, left: 55 }}>
                <CartesianGrid strokeDasharray="3 3" stroke="#f0f0f0" />
                <XAxis type="number" tick={{ fontSize: 10 }} unit="%" domain={[0, 35]} />
                <YAxis type="category" dataKey="f" tick={{ fontSize: 10 }} width={50} />
                <Tooltip contentStyle={{ fontSize: 12 }} />
                <Bar dataKey="failPct" name="Fail %" fill="#ef4444" radius={[0, 3, 3, 0]} />
              </BarChart>
            </ResponsiveContainer>
          </div>
        </div>
      )}

      {tab === "failures" && (
        <div>
          <div className="text-sm font-medium text-gray-700 mb-1">Failure hotspots: top 10 by failed orders</div>
          <div className="text-xs text-gray-400 mb-3">Which stages and facilities accumulate the most failures.</div>
          <table className="w-full text-xs">
            <thead>
              <tr className="border-b border-gray-200">
                <th className="text-left py-2 px-2 text-gray-500 font-medium">Failed at stage</th>
                <th className="text-left py-2 px-2 text-gray-500 font-medium">Facility</th>
                <th className="text-right py-2 px-2 text-gray-500 font-medium">Failed orders</th>
                <th className="text-right py-2 px-2 text-gray-500 font-medium">Median time to fail</th>
              </tr>
            </thead>
            <tbody>
              {FAIL_DATA.map((r, i) => (
                <tr key={i} className={`border-b border-gray-100 ${i % 2 === 0 ? "" : "bg-gray-50/50"}`}>
                  <td className="py-1.5 px-2 text-gray-700">{r.stage}</td>
                  <td className="py-1.5 px-2 font-medium text-gray-800">{r.facility}</td>
                  <td className={`text-right py-1.5 px-2 ${r.count > 100 ? "text-red-600 font-medium" : r.count > 20 ? "text-amber-600" : "text-gray-600"}`}>{r.count}</td>
                  <td className={`text-right py-1.5 px-2 ${r.hrs > 50 ? "text-red-600" : r.hrs < 5 ? "text-green-600" : "text-gray-600"}`}>{r.hrs} hrs</td>
                </tr>
              ))}
            </tbody>
          </table>

          <div className="text-sm font-medium text-gray-700 mb-2 mt-6">Daily failure count trend</div>
          <div style={{ height: 200 }}>
            <ResponsiveContainer width="100%" height="100%">
              <ComposedChart data={TREND_DATA} margin={{ top: 5, right: 5, bottom: 5, left: 5 }}>
                <CartesianGrid strokeDasharray="3 3" stroke="#f0f0f0" />
                <XAxis dataKey="day" tick={{ fontSize: 10 }} />
                <YAxis yAxisId="left" tick={{ fontSize: 11 }} />
                <YAxis yAxisId="right" orientation="right" tick={{ fontSize: 11 }} />
                <Tooltip contentStyle={{ fontSize: 12 }} />
                <Bar yAxisId="left" dataKey="failed" fill="#fca5a5" name="Failed" />
                <Bar yAxisId="left" dataKey="sla" fill="#fbbf24" name="SLA breached" />
                <Line yAxisId="right" type="monotone" dataKey="failPct" stroke="#dc2626" strokeWidth={2} dot={{ r: 3 }} name="Fail %" />
              </ComposedChart>
            </ResponsiveContainer>
          </div>

          <div className="bg-red-50 border border-red-200 rounded-lg p-3 mt-4">
            <div className="text-xs font-medium text-red-800 mb-1">Top action items</div>
            <div className="text-xs text-red-700 space-y-1">
              <div>1. SE_INK: 176 failures after P2 (deleg order in GN) - investigate workflow_service routing</div>
              <div>2. US_ANS: 157 failures at same stage - similar root cause?</div>
              <div>3. AU_CMP: 26 failures after P4 (partner plate) - plate quality or config issue</div>
              <div>4. SE_INK: negative batch&rarr;print timing needs timestamp investigation</div>
            </div>
          </div>
        </div>
      )}

      <div className="text-[10px] text-gray-400 mt-6 pt-3 border-t border-gray-100">
        Source: gelato-data-warehouse.gelato_schema.fct_connect_delegation_transition | 42 columns | Numbering per DBI-5233
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
