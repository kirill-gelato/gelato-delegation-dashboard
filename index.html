    let steps=[["C1","Order created","2 min","c"],["C2","Order in GN","4.3 hrs","b"],["C3","Plate build","2 min","c"],["C4","Plate uploaded","16 min","c"],["C5","Delegation fires","<1 min","c"]];
    let ps=[["P1","Deleg order","<1 min","p"],["P2","Deleg in GN","<1 min","p"],["P3","Batch release","23.7 hrs","b"],["P4","Partner plate","6 min","p"],["P5","Printed","<1 min","p"],["P7","Scanned","<1 min","p"],["P8","Shipped","<1 min","p"]];
    c.innerHTML=`<div class="sec">Order journey: median stage durations (DBI-5233)</div><div class="dsc">Create side (C1-C5) then Connect side (P1-P10)</div><div class="flow">${steps.map(s=>fs(...s)).join('<span class="ar">\u2192</span>')}</div><div class="flow">${ps.map(s=>fs(...s)).join('<span class="ar">\u2192</span>')}</div><div class="sec">${R}-day volume and failure trend</div><div class="cc" style="height:220px"><canvas id="c1"></canvas></div>`;
    ch.push(new Chart(document.getElementById("c1"),{type:"bar",data:{labels:rd.map(x=>x.d),datasets:[{label:"Pairs",data:rd.map(x=>x.p),backgroundColor:"rgba(59,130,246,.25)",order:2},{label:"Shipped",data:rd.map(x=>x.s),backgroundColor:"rgba(16,185,129,.4)",order:2},{label:"Failed",data:rd.map(x=>x.f),backgroundColor:"#ef4444",order:2},{type:"line",label:"Fail %",data:rd.map(x=>x.fp),borderColor:"#dc2626",backgroundColor:"rgba(220,38,38,.05)",fill:true,borderWidth:2,pointRadius:3,tension:.4,yAxisID:"y1",order:1}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{size:10}}}},scales:{y:{beginAtZero:true},y1:{position:"right",min:0,max:40,ticks:{callback:v=>v+"%"},grid:{display:false}}}}}));
  }else if(tb==="trends"){
    c.innerHTML=`<div class="sec">Bottleneck #1: P3 Batch release wait (median hrs)</div><div class="dsc">Should be under 20 hrs. Spikes indicate scheduling or cutoff issues.</div><div class="cc"><canvas id="c1"></canvas></div><div class="sec">Bottleneck #2: C2 GN propagation (median hrs)</div><div class="dsc">Should be under 2 hrs. Rising trend indicates platform slowdown.</div><div class="cc"><canvas id="c2"></canvas></div><div class="sec">End-to-end median (hrs)</div><div class="dsc">Total time from C1 order creation to P8 shipped. Downward trend = improvement.</div><div class="cc"><canvas id="c3"></canvas></div>`;
    let mk=(id,k,col,mx)=>ch.push(new Chart(document.getElementById(id),{type:"line",data:{labels:td.map(x=>x.d),datasets:[{data:td.map(x=>x[k]),borderColor:col,backgroundColor:col+"22",fill:true,borderWidth:2,pointRadius:3,tension:.4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,max:mx,ticks:{callback:v=>v+"h"}}}}}));
    mk("c1","p3","#ef4444",60);mk("c2","c2","#d97706",6);mk("c3","e","#3b82f6",130);
  }else if(tb==="facilities"){
    let h=`<div class="sec">Facility heatmap: median hours per stage</div><div class="dsc">Red = slowest stage per facility. Sorted by volume.${P!=="all"?" Showing: "+(P==="V"?"Connect (within Connect platform)":"Create (Create to Connect partner)"):""}</div><table><thead><tr><th>Facility</th><th class="r">Orders</th><th class="r">Deleg%<div class="ts">deleg/orig</div></th><th class="r">Create\u2192Deleg<div class="ts">C1\u2192P1</div></th><th class="r">Deleg\u2192Batch<div class="ts">P1\u2192P3</div></th><th class="r">Batch\u2192Print<div class="ts">P3\u2192P5</div></th><th class="r">Print\u2192Ship<div class="ts">P5\u2192P8</div></th><th class="r">E2E</th><th class="r">Fail%</th></tr></thead><tbody>`;
    ff.forEach(r=>{let mx=Math.max(r.cd,r.db,Math.abs(r.bp),r.ps),fp=(r.fl/r.o*100).toFixed(1);
      h+=`<tr><td style="font-weight:500">${r.f}${P==="all"?` <span style="color:#aaa;font-weight:400;font-size:10px">${r.pt==="V"?"Connect":"Create"}</span>`:""}</td><td class="r">${r.o.toLocaleString()}</td><td class="r ${r.dp>=100?"gr":r.dp>=95?"":"am"}">${r.dp}%</td><td class="r ${r.cd===mx&&mx>5?"re":hc(r.cd,20)}">${r.cd}h</td><td class="r ${r.db===mx&&mx>5?"re":hc(r.db,35)}">${r.db}h</td><td class="r ${Math.abs(r.bp)===mx&&mx>5?"re":hc(r.bp,50)}">${r.bp}h</td><td class="r ${hc(r.ps,2)}">${r.ps}h</td><td class="r ${hc(r.ee,100)}">${r.ee}h</td><td class="r ${fp>15?"re":fp>5?"am":"gr"}">${fp}%</td></tr>`});
    h+=`</tbody></table><div style="font-size:10px;color:#bbb;margin:4px 0">* Negative batch\u2192print values indicate timestamp ordering issues</div><div class="sec">Failure rate by facility</div><div class="cc" style="height:${Math.max(200,ff.length*24)}px"><canvas id="c1"></canvas></div>`;
    c.innerHTML=h;
    let so=[...ff].sort((a,b)=>(b.fl/b.o)-(a.fl/a.o));
    ch.push(new Chart(document.getElementById("c1"),{type:"bar",data:{labels:so.map(x=>x.f),datasets:[{data:so.map(x=>+(x.fl/x.o*100).toFixed(1)),backgroundColor:"#ef4444"}]},options:{responsive:true,maintainAspectRatio:false,indexAxis:"y",plugins:{legend:{display:false}},scales:{x:{max:35,ticks:{callback:v=>v+"%"}}}}}));
  }else{
    let h=`<div class="sec">Failure hotspots: top 10 by failed orders</div><div class="dsc">Click count to open in MPJ. \uD83D\uDCCB copies all order IDs.</div><table><thead><tr><th>Failed at stage</th><th>Facility</th><th class="r">Failed orders</th><th class="r">Median time to fail</th></tr></thead><tbody>`;
    FL.forEach((r,i)=>{h+=`<tr><td>${r.s}</td><td style="font-weight:500">${r.fc}</td><td class="r" style="white-space:nowrap"><a href="${MPJ}${encodeURIComponent(r.ids)}" target="_blank" class="lk ${r.n>100?"re":r.n>20?"am":""}">${r.n}</a><button class="cb" onclick="cp(this,${i})">\uD83D\uDCCB</button></td><td class="r ${r.h>50?"re":r.h<5?"gr":""}">${r.h} hrs</td></tr>`});
    h+=`</tbody></table><div class="sec">Daily failure count trend</div><div class="cc"><canvas id="c1"></canvas></div><div class="al"><h4>Top action items</h4><div>1. SE_INK: 176 failures after P2 (deleg order in GN) - investigate workflow_service routing</div><div>2. US_ANS: 157 failures at same stage - similar root cause?</div><div>3. AU_CMP: 25 failures after P4 (partner plate) - plate quality or config issue</div><div>4. SE_INK: negative batch\u2192print timing needs timestamp investigation</div></div>`;
    c.innerHTML=h;
    ch.push(new Chart(document.getElementById("c1"),{type:"bar",data:{labels:td.map(x=>x.d),datasets:[{label:"Failed",data:td.map(x=>x.f),backgroundColor:"#fca5a5",order:2},{label:"SLA breached",data:td.map(x=>x.sl),backgroundColor:"#fbbf24",order:2},{type:"line",label:"Fail %",data:td.map(x=>x.fp),borderColor:"#dc2626",backgroundColor:"rgba(220,38,38,.05)",fill:true,borderWidth:2,pointRadius:3,tension:.4,yAxisID:"y1",order:1}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{size:10}}}},scales:{y:{beginAtZero:true},y1:{position:"right",grid:{display:false}}}}}));
  }
}
function cp(b,i){var t=FL[i].ids;try{if(navigator.clipboard&&window.isSecureContext){navigator.clipboard.writeText(t).then(function(){ok(b)}).catch(function(){fb(t,b)})}else{fb(t,b)}}catch(e){fb(t,b)}}
function fb(t,b){try{var a=document.createElement("textarea");a.value=t;a.style.cssText="position:fixed;left:-9999px;top:-9999px";document.body.appendChild(a);a.focus();a.select();var r=document.execCommand("copy");document.body.removeChild(a);if(r){ok(b)}else{window.prompt("Copy order IDs:",t)}}catch(e){window.prompt("Copy order IDs:",t)}}
function ok(b){b.textContent="\u2713 copied";b.classList.add("ok");setTimeout(function(){b.textContent="\uD83D\uDCCB";b.classList.remove("ok")},2000)}
go();
</script>
</body>
</html>
